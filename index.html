<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Family Banking">
<title>Family Banking</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; height:100%; background:#222; font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  #root { width:100%; height:100%; display:flex; align-items:center; justify-content:center; }
</style>
</head>
<body>
<div id="root"></div>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
  import { getAuth, signInAnonymously, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, setDoc, onSnapshot }
    from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

  // ====== CẤU HÌNH FIREBASE CỦA GIA ĐÌNH BẠN ======
  const firebaseConfig = {
    apiKey: "AIzaSyAcxtl7gNLY0BMbeEj-6xZakn56K4-Wihc",
    authDomain: "familybanking-b7c27.firebaseapp.com",
    projectId: "familybanking-b7c27",
    storageBucket: "familybanking-b7c27.firebasestorage.app",
    messagingSenderId: "159907803948",
    appId: "1:159907803948:web:8afcdf7f7e5d2aa1463289"
  };
  // Mã gia đình bí mật — chỉ gia đình bạn biết mã này
  const FAMILY_CODE = "1709";
  // ====================================================

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const deviceId = Math.random().toString(36).slice(2);
  let lastWriteVersion = null;
  let authReady = null;

  function ensureAuth() {
    if (!authReady) {
      authReady = new Promise((resolve) => {
        onAuthStateChanged(auth, (user) => {
          if (user) resolve(user);
        });
        signInAnonymously(auth).catch((err) => console.error("Lỗi đăng nhập ẩn danh:", err));
      });
    }
    return authReady;
  }

  function famDoc() {
    return doc(db, "families", FAMILY_CODE);
  }

  window.storage = {
    get: async function (key, shared) {
      await ensureAuth();
      const snap = await getDoc(famDoc());
      const values = snap.exists() ? (snap.data().values || {}) : {};
      if (!(key in values)) throw new Error('not found');
      return { key: key, value: values[key], shared: !!shared };
    },
    set: async function (key, value, shared) {
      await ensureAuth();
      const ref = famDoc();
      const snap = await getDoc(ref);
      const values = snap.exists() ? (snap.data().values || {}) : {};
      values[key] = value;
      const version = Date.now() + '-' + deviceId;
      lastWriteVersion = version;
      await setDoc(ref, { values: values, version: version, updatedBy: deviceId }, { merge: true });
      return { key: key, value: value, shared: !!shared };
    }
  };

  // Lắng nghe thay đổi từ các thiết bị khác trong gia đình -> tự tải lại để cập nhật dữ liệu mới nhất
  ensureAuth().then(() => {
    onSnapshot(famDoc(), (snap) => {
      if (!snap.exists()) return;
      const d = snap.data();
      if (d.updatedBy === deviceId) return;
      if (d.version === lastWriteVersion) return;
      location.reload();
    });
  });
</script>
